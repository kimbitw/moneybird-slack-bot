services:
  - type: web
    name: moneybird-slack-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /

  - type: web
    name: moneybird-mcp
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn mcp_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
